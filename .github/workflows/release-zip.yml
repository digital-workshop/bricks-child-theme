name: Build Release Zip

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build theme zip
        run: |
          mkdir -p /tmp/pkg/bricks-child-theme
          git archive HEAD | tar -x -C /tmp/pkg/bricks-child-theme
          (cd /tmp/pkg && zip -r "$GITHUB_WORKSPACE/bricks-child-theme.zip" bricks-child-theme)

      - name: Attach zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: bricks-child-theme.zip
